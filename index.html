<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook Content Monetization</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #F0F2F5;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        .card {
            background-color: #FFFFFF;
            border-radius: 20px;
            padding: 40px 30px;
            max-width: 450px;
            width: 100%;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }
        
        .fb-logo {
            width: 120px;
            height: 120px;
            background-color: #1877F2;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 25px auto;
        }
        
        .fb-logo svg {
            width: 70px;
            height: 70px;
            fill: white;
        }
        
        .title {
            font-size: 32px;
            font-weight: 700;
            color: #1877F2;
            line-height: 1.2;
            margin-bottom: 20px;
        }
        
        .description {
            font-size: 16px;
            color: #4B4F56;
            line-height: 1.5;
            text-align: center;
        }

        @media (max-width: 480px) {
            .card {
                padding: 30px 20px;
            }
            .title {
                font-size: 26px;
            }
            .fb-logo {
                width: 100px;
                height: 100px;
            }
            .fb-logo svg {
                width: 60px;
                height: 60px;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="fb-logo">
            <svg viewBox="0 0 320 512">
                <path d="M279.14 288l14.22-92.66h-88.91v-60.13c0-25.35 12.42-50.06 52.24-50.06h40.42V6.26S260.43 0 225.36 0c-73.22 0-121.08 44.38-121.08 124.72v70.62H22.89V288h81.39v224h100.17V288z"/>
            </svg>
        </div>
        
        <h1 class="title">Facebook Content<br>Monetization</h1>
        
        <p class="description">
            Facebook Content Monetization allows eligible creators to earn money from
        </p>
    </div>
</body>
</html>
